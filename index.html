<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dark Ghoul AT Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top bar: displays basic status and access to the menu -->
  <header id="top-bar">
    <div class="left-group">
      <button id="menu-btn" aria-label="Menu">☰</button>
      <span id="machine-name">Dark Ghoul AT</span>
    </div>
    <div id="status-panel">
      <div class="status-item"><label>Credits</label><span id="credits">0</span></div>
      <div class="status-item"><label>Difference</label><span id="difference">0</span></div>
      <div class="status-item"><label>Game</label><span id="game-count">0</span></div>
      <div class="status-item debug-only"><label>State</label><span id="debug-state">-</span></div>
      <div class="status-item debug-only"><label>Mode</label><span id="debug-mode">-</span></div>
    </div>
  </header>

  <!-- Main display area: shows reels and LCD video/graphics -->
  <main id="main-display">
    <div id="lcd-container">
      <!-- background layer for looping videos or CSS animations -->
      <video id="background-video" class="video-layer" autoplay loop muted playsinline></video>
      <!-- cut-in layer for short bursts of video -- can overlay background -->
      <video id="cutin-video" class="video-layer hidden" muted playsinline></video>
      <!-- lcd layer for smaller video animations or CSS effects -->
      <video id="lcd-video" class="video-layer hidden" muted playsinline></video>
    </div>
    <div id="reel-container">
      <div class="reel" id="reel1">
        <div class="symbol">-</div>
      </div>
      <div class="reel" id="reel2">
        <div class="symbol">-</div>
      </div>
      <div class="reel" id="reel3">
        <div class="symbol">-</div>
      </div>
    </div>
    <div id="log-panel" class="debug-only"></div>
  </main>

  <!-- Control panel: bet, lever, stops, auto, skip -->
  <footer id="control-panel">
    <button id="bet-btn" class="btn control">BET</button>
    <button id="lever-btn" class="btn control">LEVER</button>
    <button id="stop1-btn" class="btn control">1</button>
    <button id="stop2-btn" class="btn control">2</button>
    <button id="stop3-btn" class="btn control">3</button>
    <button id="auto-btn" class="btn control">AUTO</button>
    <button id="skip-btn" class="btn control">SKIP</button>
  </footer>

  <!-- Modal overlay: contains various panels (settings, stats, save/load, etc.) -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-content">
      <header id="modal-header">
        <h2 id="modal-title">Menu</h2>
        <button id="modal-close-btn" aria-label="Close">✕</button>
      </header>
      <div id="modal-body">
        <!-- Content dynamically injected by app.js -->
      </div>
    </div>
  </div>

  <script src="machine-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
